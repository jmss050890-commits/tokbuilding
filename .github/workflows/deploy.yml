name: Deploy SVL to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_ORG_ID: team_9F0lhDbSrmYBanApFzVxbEXt
      VERCEL_PROJECT_ID: prj_T4IHU9BiMv2G19M3NSsKe68BjIO3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present || echo "No lint script"

      - name: Build application
        run: npm run build

      - name: Install Vercel CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm install --global vercel@latest

      - name: Validate Vercel token
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        shell: bash
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing VERCEL_TOKEN secret. Add a Vercel token with access to org $VERCEL_ORG_ID and project $VERCEL_PROJECT_ID."
            exit 1
          fi

          if ! vercel whoami --token="$VERCEL_TOKEN"; then
            echo "::error::VERCEL_TOKEN is invalid or expired. Rotate the token in GitHub Actions secrets before rerunning deploy."
            exit 1
          fi

      - name: Pull Vercel project settings
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        shell: bash
        run: |
          set +e
          output=$(vercel pull --yes --environment=production --token="$VERCEL_TOKEN" 2>&1)
          status=$?
          echo "$output"

          if [ $status -ne 0 ]; then
            echo "::error::vercel pull failed after token validation. The token is valid, so it likely does not have access to org $VERCEL_ORG_ID and project $VERCEL_PROJECT_ID, or the project linkage no longer matches Vercel."
            exit $status
          fi

      - name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Comment PR with deployment status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build successful! PR ready for review.'
            })
