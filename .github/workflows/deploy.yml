name: Deploy SVL to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_ORG_ID: team_9F0lhDbSrmYBanApFzVxbEXt
      VERCEL_PROJECT_ID: prj_T4IHU9BiMv2G19M3NSsKe68BjIO3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present || echo "No lint script"

      - name: Build application
        run: npm run build

      - name: Install Vercel CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Comment PR with deployment status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build successful! PR ready for review.'
            })
